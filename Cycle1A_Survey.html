<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1A1830" />
<title>Cycle 1A · Language Framing Survey · MDR Thesis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-page: #F6F4FB;
    --bg-card: #ffffff;
    --bg-soft: #F1ECFA;
    --ink: #1A1830;
    --ink-soft: #6F6B85;
    --ink-faint: #B0ADC2;
    --border: rgba(108, 92, 231, 0.10);
    --purple: #6C5CE7;
    --purple-soft: #EDE9FC;
    --teal: #0EBFD9;
    --coral: #FF7B5C;
    --green: #2EB36B;
    --r-md: 14px;
    --r-lg: 20px;
    --shadow-sm: 0 2px 8px rgba(26, 24, 48, 0.05);
    --shadow-md: 0 8px 24px rgba(26, 24, 48, 0.07);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg-page); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  button, input, select, textarea { font-family: inherit; }
  button { cursor: pointer; }
  .app { max-width: 720px; margin: 0 auto; padding: 32px 24px 60px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: -0.3px; }
  .logo .dot { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--teal)); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo .meta { font-size: 11px; color: var(--ink-faint); font-weight: 500; }

  .progress { padding: 0 4px; margin-bottom: 18px; }
  .progress .track { height: 4px; background: rgba(108,92,231,0.10); border-radius: 999px; overflow: hidden; }
  .progress .fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); border-radius: 999px; transition: width 0.4s var(--ease-out); }
  .progress .label { font-size: 11px; color: var(--ink-faint); margin-top: 6px; text-align: center; font-weight: 600; letter-spacing: 0.04em; }

  .scene { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-md); padding: 32px 28px; margin-bottom: 18px; animation: in 0.4s var(--ease-out) both; }
  @keyframes in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .eyebrow { font-family: 'Manrope', sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em; color: var(--purple); text-transform: uppercase; margin-bottom: 10px; }
  .scene h1 { font-family: 'Source Serif Pro', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.4px; line-height: 1.25; margin-bottom: 12px; }
  .scene h2 { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.3; margin-bottom: 8px; }
  .scene .lede { font-size: 14.5px; color: var(--ink-soft); margin-bottom: 22px; line-height: 1.55; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: 0.02em; }
  .field input[type="text"], .field select { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; color: var(--ink); background: var(--bg-card); transition: border-color 0.15s; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--purple); }

  .radios { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .radios button { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 14px; font-size: 13px; font-weight: 600; color: var(--ink); text-align: left; transition: all 0.15s; }
  .radios button:hover { border-color: var(--purple); }
  .radios button.on { background: var(--purple); color: #fff; border-color: var(--purple); }

  .q { margin-bottom: 22px; }
  .q .label { font-size: 14.5px; font-weight: 600; color: var(--ink); margin-bottom: 12px; line-height: 1.4; }

  .likert { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .likert button { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 4px; font-size: 12px; font-weight: 600; color: var(--ink-soft); transition: all 0.15s; }
  .likert button:hover { border-color: var(--purple); }
  .likert button.on { background: var(--purple); color: #fff; border-color: var(--purple); transform: scale(1.04); }
  .likert button .num { font-family: 'Manrope', sans-serif; font-size: 18px; font-weight: 800; display: block; }
  .likert-ends { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--ink-faint); margin-top: 6px; padding: 0 4px; }

  .framing-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--bg-soft); border-radius: 12px; margin-bottom: 22px; }
  .framing-head .badge { width: 40px; height: 40px; border-radius: 10px; background: var(--purple); color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 18px; }
  .framing-head .nm { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: -0.2px; }
  .framing-head .em { font-size: 12px; color: var(--ink-faint); font-style: italic; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; gap: 12px; }
  .nav button { padding: 14px 26px; border-radius: 999px; font-size: 14px; font-weight: 700; border: none; transition: all 0.15s; }
  .nav .back { background: var(--bg-card); color: var(--ink-soft); border: 1px solid var(--border); }
  .nav .next { background: linear-gradient(135deg, var(--purple), var(--teal)); color: #fff; box-shadow: 0 6px 18px rgba(108, 92, 231, 0.35); }
  .nav .next:hover:not(:disabled) { transform: translateY(-1px); }
  .nav .submit { background: var(--coral); color: #fff; box-shadow: 0 6px 18px rgba(255, 123, 92, 0.4); }
  .nav button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Result */
  .result-winner { background: linear-gradient(135deg, var(--coral), #FFC862); color: #fff; padding: 40px 32px; border-radius: var(--r-lg); text-align: center; margin-bottom: 18px; box-shadow: 0 20px 50px rgba(255,123,92,0.25); }
  .result-winner .small { font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.22em; opacity: 0.85; margin-bottom: 10px; }
  .result-winner .letter { font-family: 'Manrope', sans-serif; font-size: 88px; font-weight: 800; line-height: 1; margin-bottom: 8px; letter-spacing: -3px; }
  .result-winner .nm { font-family: 'Source Serif Pro', serif; font-size: 34px; font-weight: 600; letter-spacing: -0.5px; }
  .result-winner .em { font-size: 14px; opacity: 0.9; margin-top: 6px; }

  .scoreboard { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .score-row { display: grid; grid-template-columns: 44px 1fr 70px; align-items: center; gap: 14px; padding: 14px 16px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
  .score-row.top { background: linear-gradient(90deg, rgba(255,123,92,0.06), transparent); border-color: rgba(255,123,92,0.3); }
  .score-row .badge { width: 36px; height: 36px; border-radius: 8px; background: var(--purple-soft); color: var(--purple); display: flex; align-items: center; justify-content: center; font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 14px; }
  .score-row.top .badge { background: var(--coral); color: #fff; }
  .score-row .nm { font-weight: 700; font-size: 14px; }
  .score-row .sub { font-size: 11px; color: var(--ink-faint); }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
  .bar { flex: 1; height: 6px; background: rgba(108,92,231,0.10); border-radius: 999px; overflow: hidden; }
  .bar .fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); border-radius: 999px; transition: width 0.5s var(--ease-out); }
  .score-row.top .bar .fill { background: linear-gradient(90deg, var(--coral), #FFC862); }
  .score-row .v { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 800; text-align: right; letter-spacing: -0.5px; color: var(--ink); }
  .score-row.top .v { color: var(--coral); }
  .sub-chips { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
  .sub-chip { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.04em; }
  .sub-chip b { color: var(--ink-soft); font-weight: 700; margin-right: 3px; }
  .score-row.top .sub-chip b { color: var(--coral); }
  .dim-legend { display: flex; flex-wrap: wrap; gap: 16px; padding: 12px 16px; background: var(--bg-soft); border-radius: 10px; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 14px; }
  .dim-legend b { color: var(--ink); font-weight: 700; }
  .sync-banner { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .sync-banner.sending { background: var(--bg-soft); color: var(--ink-soft); }
  .sync-banner.ok      { background: rgba(46,179,107,0.10); color: var(--green); }
  .sync-banner.err     { background: rgba(255,123,92,0.12); color: var(--coral); }
  .sync-banner.off     { background: var(--bg-soft); color: var(--ink-faint); font-weight: 500; }
  .sync-banner .spinner { width: 14px; height: 14px; border: 2px solid rgba(108,92,231,0.25); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
  .result-actions button { padding: 16px 22px; border-radius: 14px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; }
  .result-actions .primary { background: linear-gradient(135deg, var(--purple), var(--teal)); color: #fff; box-shadow: 0 8px 22px rgba(108,92,231,0.3); }
  .result-actions .primary:hover { transform: translateY(-1px); }
  .result-actions .secondary { background: var(--bg-card); color: var(--ink); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .result-actions .secondary:hover { border-color: var(--purple); }

  .result-note { padding: 16px 20px; background: var(--purple-soft); border-radius: 12px; font-size: 13px; color: var(--ink-soft); line-height: 1.55; margin-top: 18px; }
  .result-note b { color: var(--ink); }

  @media (max-width: 600px) {
    .app { padding: 18px 14px 40px; }
    .scene { padding: 22px 18px; }
    .radios { grid-template-columns: 1fr; }
    .likert button { padding: 12px 2px; }
    .likert button .num { font-size: 16px; }
    .result-winner .letter { font-size: 64px; }
    .result-winner .nm { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="logo">
      <div class="dot">🌍</div>
      <div>
        <div>Planet Dashboard</div>
        <div class="meta">Cycle 1A · Language Framing Survey · MDR Thesis</div>
      </div>
    </div>
  </header>

  <div class="progress" id="progress-wrap">
    <div class="track"><div class="fill" id="progress-fill" style="width: 12%"></div></div>
    <div class="label" id="progress-label">Step 1 of 8</div>
  </div>

  <div id="stage"></div>

  <div class="nav" id="nav">
    <button class="back" id="back-btn" disabled>← Back</button>
    <button class="next" id="next-btn">Next →</button>
  </div>
</div>

<script>
// ============================================
// CONFIG
// ============================================
const FRAMINGS = {
  A: { label: "A · Scientific",  em: "Expert source register",   description: "The version that used technical language, control variables, thresholds and citations." },
  B: { label: "B · Hybrid",      em: "Bilingual bridge",         description: "The version that paired each scientific concept with a plain-language reading." },
  C: { label: "C · Everyday",    em: "Vernacular comprehension", description: "The version that used story-led, conversational, tangible comparisons." },
  D: { label: "D · Narrative",   em: "First-person address",     description: "The version where the planet (or boundary) spoke to you directly." },
  E: { label: "E · Poetic",      em: "Compressed image",         description: "The version that used image, metaphor, rhythm — no exposition." },
};
const ORDER = ["A","B","C","D","E"];

const QUESTIONS = [
  { id: "cognitive",    dim: "Cognitive",    short: "Cog", label: "How clearly did this framing explain the planet's situation to you?",                                  endsLeft: "Not at all",  endsRight: "Very clearly" },
  { id: "affective",    dim: "Affective",    short: "Aff", label: "How much did this framing make you feel something?",                                                   endsLeft: "Nothing",     endsRight: "Deeply" },
  { id: "memorability", dim: "Memorability", short: "Mem", label: "How likely are you to remember the content of this framing a week from now?",                          endsLeft: "Unlikely",    endsRight: "Very likely" },
  { id: "intentional",  dim: "Intentional",  short: "Int", label: "How likely are you to act differently — or share this with someone — because of this framing?",        endsLeft: "Unlikely",    endsRight: "Very likely" },
];

const NEXT_SURVEY = "Cycle1B_Survey.html";  // routes here with ?framing=X

// ============================================
// GOOGLE SHEETS BACKEND (optional)
// Paste your Apps Script Web App URL between the quotes to enable.
// If left empty, the survey still works — just no remote logging.
// See GoogleSheets_AppsScript.gs and Surveys_README.md for setup.
// ============================================
const SHEETS_ENDPOINT = "";  // e.g. "https://script.google.com/macros/s/AKfycb.../exec"

// ============================================
// STATE
// ============================================
const state = {
  step: 0,
  demographics: { age: "", gender: "", from: "" },
  ratings: {},  // { A: {communicate, moved, remember}, ... }
};
for (const f of ORDER) state.ratings[f] = {};

// Restore from localStorage (in case of accidental refresh)
const RESTORE_KEY = "cycle1a_survey_inflight_v1";
try {
  const saved = JSON.parse(localStorage.getItem(RESTORE_KEY) || "null");
  if (saved && saved.step !== undefined) Object.assign(state, saved);
} catch {}
function persist() {
  localStorage.setItem(RESTORE_KEY, JSON.stringify(state));
}

const STEPS = [
  "welcome",
  "demographics",
  "rate_A",
  "rate_B",
  "rate_C",
  "rate_D",
  "rate_E",
  "result",
];

function render() {
  const pct = Math.round(((state.step + 1) / STEPS.length) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = `Step ${state.step + 1} of ${STEPS.length}`;
  const step = STEPS[state.step];
  const stage = document.getElementById("stage");

  if (step === "result") {
    document.getElementById("progress-wrap").style.display = "none";
    document.getElementById("nav").style.display = "none";
  } else {
    document.getElementById("progress-wrap").style.display = "";
    document.getElementById("nav").style.display = "";
  }

  if (step === "welcome") stage.innerHTML = sceneWelcome();
  else if (step === "demographics") stage.innerHTML = sceneDemo();
  else if (step.startsWith("rate_")) stage.innerHTML = sceneRate(step.slice(5));
  else if (step === "result") {
    stage.innerHTML = sceneResult();
    // Fire-and-forget POST to Google Sheets (if configured)
    setTimeout(() => submitToSheets(buildRecord()), 0);
  }

  bind(step);
  updateNav();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ============================================
// SCENES
// ============================================
function sceneWelcome() {
  return `
    <div class="scene">
      <div class="eyebrow">Cycle 1A · Language Framing Survey</div>
      <h1>Which way of telling the planet's story worked best for you?</h1>
      <div class="lede">
        You've just experienced five short prototypes that each present the Planetary Boundaries in a different language. This survey asks you to rate each one. It takes about 5 minutes.
      </div>
      <div class="lede" style="background: var(--bg-soft); padding: 14px 18px; border-radius: 10px; color: var(--ink);">
        <b>How this works.</b> First, three quick demographic questions. Then three rating questions for each of the five framings. At the end you'll see which framing scored highest for you, and the survey will hand you off to the next stage.
      </div>
    </div>
  `;
}

function sceneDemo() {
  return `
    <div class="scene">
      <div class="eyebrow">Step ${state.step + 1} · About you</div>
      <h2>A few quick questions before we start.</h2>
      <div class="lede">No name, no email. Just background context for the research.</div>

      <div class="field">
        <label for="age">Age range</label>
        <select id="age" data-d="age">
          <option value="">Select…</option>
          <option value="18–24" ${state.demographics.age === "18–24" ? "selected" : ""}>18–24</option>
          <option value="25–34" ${state.demographics.age === "25–34" ? "selected" : ""}>25–34</option>
          <option value="35–44" ${state.demographics.age === "35–44" ? "selected" : ""}>35–44</option>
          <option value="45–54" ${state.demographics.age === "45–54" ? "selected" : ""}>45–54</option>
          <option value="55–64" ${state.demographics.age === "55–64" ? "selected" : ""}>55–64</option>
          <option value="65+"   ${state.demographics.age === "65+" ? "selected" : ""}>65+</option>
          <option value="prefer-not"   ${state.demographics.age === "prefer-not" ? "selected" : ""}>Prefer not to say</option>
        </select>
      </div>

      <div class="field">
        <label>Gender</label>
        <div class="radios" data-d="gender">
          ${["Female","Male","Non-binary","Prefer not to say"].map(g => `
            <button data-v="${g}" class="${state.demographics.gender === g ? "on" : ""}">${g}</button>
          `).join("")}
        </div>
      </div>

      <div class="field">
        <label for="from">Where are you from?  <span style="font-weight:500;color:var(--ink-faint);">(country or region)</span></label>
        <input id="from" type="text" data-d="from" placeholder="e.g. Sri Lanka, Tokyo, Berlin…" value="${state.demographics.from || ""}" />
      </div>
    </div>
  `;
}

function sceneRate(f) {
  const fr = FRAMINGS[f];
  const data = state.ratings[f] || {};
  const idx = ORDER.indexOf(f) + 1;
  const likertHtml = (q) => `
    <div class="q" data-qid="${q.id}">
      <div class="label">${q.label}</div>
      <div class="likert" data-likert="${q.id}">
        ${[1,2,3,4,5].map(n => `<button data-v="${n}" class="${data[q.id] === n ? "on" : ""}"><span class="num">${n}</span></button>`).join("")}
      </div>
      <div class="likert-ends"><span>${q.endsLeft}</span><span>${q.endsRight}</span></div>
    </div>`;
  return `
    <div class="scene">
      <div class="eyebrow">Framing ${idx} of 5</div>
      <div class="framing-head">
        <div class="badge">${f}</div>
        <div>
          <div class="nm">${fr.label}</div>
          <div class="em">${fr.em}</div>
        </div>
      </div>
      <div class="lede"><b>Remember the version that was…</b> ${fr.description}</div>
      ${QUESTIONS.map(likertHtml).join("")}
    </div>
  `;
}

function computeResult() {
  const scores = ORDER.map(f => {
    const r = state.ratings[f] || {};
    const vals = QUESTIONS.map(q => r[q.id]).filter(v => v !== undefined);
    const avg = vals.length ? vals.reduce((s,v) => s+v, 0) / vals.length : 0;
    return { f, avg, raw: r };
  });
  scores.sort((a, b) => b.avg - a.avg);
  return scores;
}

function sceneResult() {
  const scores = computeResult();
  const winner = scores[0];
  const wFr = FRAMINGS[winner.f];
  const maxAvg = 5;
  const rows = scores.map((s, i) => {
    const fr = FRAMINGS[s.f];
    const pct = (s.avg / maxAvg) * 100;
    const chips = QUESTIONS.map(q => {
      const v = s.raw[q.id];
      return `<span class="sub-chip"><b>${q.short}</b> ${v !== undefined ? v : '–'}</span>`;
    }).join('');
    return `
      <div class="score-row ${i === 0 ? "top" : ""}">
        <div class="badge">${s.f}</div>
        <div>
          <div class="nm">${fr.label.split(" · ")[1]}</div>
          <div class="sub">${fr.em}</div>
          <div class="bar-row">
            <div class="bar"><div class="fill" style="width: ${Math.max(2, pct)}%"></div></div>
          </div>
          <div class="sub-chips">${chips}</div>
        </div>
        <div class="v">${s.avg.toFixed(2)}</div>
      </div>
    `;
  }).join("");

  // Clear in-flight backup once result is shown
  localStorage.removeItem(RESTORE_KEY);

  return `
    <div class="result-winner">
      <div class="small">YOUR STRONGEST FRAMING IS</div>
      <div class="letter">${winner.f}</div>
      <div class="nm">${wFr.label.split(" · ")[1]}</div>
      <div class="em">${wFr.em}</div>
    </div>
    <div id="sync-banner" class="sync-banner off">Cloud sync not configured · local download only.</div>
    <div class="scene">
      <h2>Your scorecard</h2>
      <div class="lede">Average of four ratings per framing. Highest score wins.</div>
      <div class="dim-legend">
        <span><b>Cog</b> = Cognitive (clarity)</span>
        <span><b>Aff</b> = Affective (feeling)</span>
        <span><b>Mem</b> = Memorability (recall)</span>
        <span><b>Int</b> = Intentional (intent to act / share)</span>
      </div>
      <div class="scoreboard">${rows}</div>

      <div class="result-actions">
        <button class="primary" onclick="goNext('${winner.f}')">Continue to interaction-paradigm survey →</button>
        <button class="secondary" onclick="downloadCSV()">↓ Download my responses (CSV)</button>
        <button class="secondary" onclick="downloadJSON()">↓ Download my responses (JSON)</button>
      </div>

      <div class="result-note">
        <b>What happens next.</b> The next survey will evaluate the five interaction paradigms — direct manipulation, estimate-reveal, conversational, narrative progression, and ambient — all using your strongest language framing (<b>${winner.f} · ${wFr.label.split(" · ")[1]}</b>). Click <b>Continue</b> when you're ready.
      </div>
    </div>
  `;
}

// ============================================
// BIND
// ============================================
function bind(step) {
  if (step === "demographics") {
    document.querySelectorAll("[data-d]").forEach(el => {
      const key = el.dataset.d;
      if (el.tagName === "SELECT" || el.tagName === "INPUT") {
        el.addEventListener("input", () => {
          state.demographics[key] = el.value;
          persist(); updateNav();
        });
      } else {
        // radios group
        el.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            el.querySelectorAll("button").forEach(b => b.classList.remove("on"));
            btn.classList.add("on");
            state.demographics[key] = btn.dataset.v;
            persist(); updateNav();
          });
        });
      }
    });
  }
  if (step.startsWith("rate_")) {
    const f = step.slice(5);
    if (!state.ratings[f]) state.ratings[f] = {};
    document.querySelectorAll("[data-likert]").forEach(group => {
      const id = group.dataset.likert;
      group.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          group.querySelectorAll("button").forEach(b => b.classList.remove("on"));
          btn.classList.add("on");
          state.ratings[f][id] = parseInt(btn.dataset.v);
          persist(); updateNav();
        });
      });
    });
  }
}

// ============================================
// NAV
// ============================================
function canAdvance() {
  const step = STEPS[state.step];
  if (step === "welcome") return true;
  if (step === "demographics") {
    const d = state.demographics;
    return d.age && d.gender && d.from && d.from.length > 0;
  }
  if (step.startsWith("rate_")) {
    const f = step.slice(5);
    const r = state.ratings[f] || {};
    return QUESTIONS.every(q => r[q.id] !== undefined);
  }
  return true;
}

function updateNav() {
  const back = document.getElementById("back-btn");
  const next = document.getElementById("next-btn");
  back.disabled = state.step === 0;
  if (STEPS[state.step + 1] === "result") {
    next.textContent = "See my result ✓";
    next.classList.add("submit"); next.classList.remove("next");
  } else {
    next.textContent = "Next →";
    next.classList.add("next"); next.classList.remove("submit");
  }
  next.disabled = !canAdvance();
}

document.getElementById("back-btn").addEventListener("click", () => {
  if (state.step > 0) { state.step--; persist(); render(); }
});
document.getElementById("next-btn").addEventListener("click", () => {
  if (!canAdvance()) return;
  if (state.step < STEPS.length - 1) { state.step++; persist(); render(); }
});

// ============================================
// DOWNLOAD + NEXT SURVEY ROUTING
// ============================================
function getParticipantId() {
  return "p" + Date.now().toString(36);
}
const PARTICIPANT_ID = getParticipantId();

function buildRecord() {
  const scores = computeResult();
  return {
    survey: "Cycle1A_Language",
    participant_id: PARTICIPANT_ID,
    timestamp: new Date().toISOString(),
    demographics: { ...state.demographics },
    ratings: { ...state.ratings },
    scores: scores.map(s => ({ framing: s.f, average: s.avg })),
    winner: scores[0].f,
  };
}

function downloadJSON() {
  const r = buildRecord();
  const blob = new Blob([JSON.stringify(r, null, 2)], { type: "application/json" });
  download(blob, `Cycle1A_${PARTICIPANT_ID}_${(state.demographics.from || "").replace(/[^\w]/g,'-')}.json`);
}

function downloadCSV() {
  const r = buildRecord();
  const lines = [];
  lines.push("section,key,value");
  lines.push(`meta,survey,${csv(r.survey)}`);
  lines.push(`meta,participant_id,${csv(r.participant_id)}`);
  lines.push(`meta,timestamp,${csv(r.timestamp)}`);
  lines.push(`demographics,age,${csv(r.demographics.age)}`);
  lines.push(`demographics,gender,${csv(r.demographics.gender)}`);
  lines.push(`demographics,from,${csv(r.demographics.from)}`);
  for (const f of ORDER) {
    const fr = r.ratings[f] || {};
    for (const q of QUESTIONS) {
      lines.push(`rating,${f}_${q.id},${csv(fr[q.id])}`);
    }
    const s = r.scores.find(s => s.framing === f);
    lines.push(`score,${f}_average,${csv(s ? s.average.toFixed(3) : "")}`);
  }
  lines.push(`result,winner,${csv(r.winner)}`);
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  download(blob, `Cycle1A_${PARTICIPANT_ID}_${(state.demographics.from || "").replace(/[^\w]/g,'-')}.csv`);
}

function csv(v) {
  if (v === undefined || v === null) return "";
  const s = String(v).replace(/"/g, '""');
  return /[",\n]/.test(s) ? `"${s}"` : s;
}
function download(blob, filename) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// ============================================
// SUBMIT TO GOOGLE SHEETS (fire-and-forget)
// ============================================
function setSyncBanner(state, text) {
  const el = document.getElementById("sync-banner");
  if (!el) return;
  el.className = "sync-banner " + state;
  el.innerHTML = (state === "sending" ? '<span class="spinner"></span> ' : "") + text;
}

function submitToSheets(record) {
  if (!SHEETS_ENDPOINT) {
    setSyncBanner("off", "Cloud sync not configured · local download only.");
    return;
  }
  setSyncBanner("sending", "Saving to Google Sheets…");
  fetch(SHEETS_ENDPOINT, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(record),
  }).then(() => {
    setSyncBanner("ok", "✓ Saved to Google Sheets.");
  }).catch((e) => {
    setSyncBanner("err", "⚠ Couldn't reach Google Sheets — your data is still in the downloads below.");
    console.warn("Sheets POST failed:", e);
  });
}

function goNext(winnerFraming) {
  // Auto-download as a safety net before navigating away
  downloadJSON();
  // Pass winning framing AND demographics to next survey via URL
  const params = new URLSearchParams({
    framing: winnerFraming,
    pid: PARTICIPANT_ID,
    age: state.demographics.age || "",
    gender: state.demographics.gender || "",
    from: state.demographics.from || "",
  });
  setTimeout(() => {
    location.href = `${NEXT_SURVEY}?${params.toString()}`;
  }, 600);
}

// ============================================
// GO
// ============================================
render();
</script>
